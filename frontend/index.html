<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>CashTrail</title>
    <meta name="description" content="CashTrail — follow every rupee. Track accounts, projects, bills, and monthly forecasts." />
    <meta name="theme-color" content="#1a5228" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CashTrail" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('cashtrail_theme') || 'forest';
          if (!/^(forest|ocean|slate|blush|clay)$/.test(t)) t = 'forest';
          document.documentElement.setAttribute('data-theme', t);
          var colors = { forest: '#047857', ocean: '#0369a1', slate: '#6d28d9', blush: '#be123c', clay: '#c2410c' };
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', colors[t] || colors.forest);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
